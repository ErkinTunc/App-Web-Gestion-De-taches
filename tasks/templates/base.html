{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=;, initial-scale=1.0">
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'tasks/styles.css' %}">
    <!-- Site Information -->
    <title>Document</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-dark bg-dark">
            <a href="/" class="navbar-brand ms-3">Task Management App</a>
            <!-- Dashboard -->
            <div class="navbar-nav flex-row ms-auto me-3">

                {% if user.is_authenticated %}
            
                    <a class="nav-link px-3" href="#">Voir mes tâches</a>
            
                    {% if user.is_superuser %}
                        <a class="nav-link px-3" href="/admin/">Panneau Admin</a>
                        <a class="nav-link px-3" href="#">Gérer les utilisateurs</a>
                    {% endif %}
            
                    <a class="nav-link px-3" href="/accounts/logout/">Déconnexion</a>
            
                {% else %}
                    <a class="nav-link px-3" href="/accounts/login/">Connexion</a>
                    <a class="nav-link px-3" href="/register/">Inscription</a>
                {% endif %}
            
            </div>
            
        </nav>
    </header>

    {% block body %}
    {% endblock %}
</body>

</html>
